<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Soft Roof Cafe Menu | bilingual menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fefaf5; font-family: 'Bona Nova SC', serif; color: #2c2b26; line-height: 1.4; }
        
        /* --- HEADER BACKGROUND WITH BLUR --- */
        .header-bg {
            position: relative;
            background: #2c3a24;
            overflow: hidden;
        }
        .header-bg::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://topkapi2025.github.io/softroof/background.jfif');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            filter: blur(8px);
            transform: scale(1.05);
            z-index: 0;
        }
        .header-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1;
        }
        .header-content {
            position: relative;
            z-index: 2;
            padding: 1.2rem 1.5rem 1rem;
        }
        
        .cafe-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        .header-content .cafe-container {
            padding: 0 1.5rem;
        }
        
        .handmade-line { width: 70px; height: 2px; background: #d0d9c6; margin: 0.75rem auto 0.5rem; border-radius: 2px; }
        .logo-block { text-align: center; margin: 1.2rem 0 1rem; }
        .logo-img {
            width: 206px;
            height: 126px;
            object-fit: cover;
            background: #e6efdf;
            border-radius: 20%;
            scale: 1.58;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,240,0.6);
        }
        .cafe-name { font-size: 1.9rem; font-weight: 700; margin-top: 1rem; color: #fef7e0; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .tagline { font-size: 0.8rem; font-style: italic; color: #f8f0da; margin-top: 0.25rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.4); }
        
        .lang-switch-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }
        .lang-toggle {
            background: rgba(255, 250, 242, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(220, 229, 207, 0.8);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-family: 'Bona Nova SC', serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c4820;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .lang-toggle i { font-size: 1rem; }
        .lang-toggle:hover {
            background: #fffaf0;
            border-color: #bdd0ab;
            transform: scale(0.98);
        }
        
        .social-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.6rem; margin: 1.1rem 0 0.5rem; }
        .social-icon { 
            color: #fef5e6; 
            font-size: 1.3rem; 
            background: rgba(0,0,0,0.4); 
            width: 38px; 
            height: 38px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 40px; 
            text-decoration: none; 
            border: 1px solid rgba(255,245,215,0.5); 
            transition: 0.2s ease;
            backdrop-filter: blur(2px);
        }
        .social-icon:hover { color: #ffffff; background: #3f6830cc; transform: translateY(-2px); border-color: #e9f5dc; }
        
        /* ========== IMPROVED SCROLL MENU ========== */
        .scroll-menu {
            margin: 2rem 0 1.2rem;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            scrollbar-width: thin;
            padding-bottom: 0.8rem;
            position: relative;
            cursor: grab;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-menu:active {
            cursor: grabbing;
        }
        /* Custom scrollbar styling (Webkit) */
        .scroll-menu::-webkit-scrollbar {
            height: 6px;
        }
        .scroll-menu::-webkit-scrollbar-track {
            background: #eae6df;
            border-radius: 10px;
        }
        .scroll-menu::-webkit-scrollbar-thumb {
            background: #b9cfaa;
            border-radius: 10px;
        }
        .scroll-menu::-webkit-scrollbar-thumb:hover {
            background: #8fb073;
        }
        
        .menu-buttons {
            display: inline-flex;
            gap: 0.8rem;
            padding: 0.2rem 0.1rem;
        }
        
        /* visual hint: gradient fading on edges to indicate scrollability */
        .scroll-hint-left, .scroll-hint-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40px;
            pointer-events: none;
            z-index: 3;
            transition: opacity 0.2s;
        }
        .scroll-hint-left {
            left: 0;
            background: linear-gradient(to right, rgba(254,250,245,0.9), transparent);
        }
        .scroll-hint-right {
            right: 0;
            background: linear-gradient(to left, rgba(254,250,245,0.9), transparent);
        }
        /* add subtle shadow under scroll menu to separate from content */
        .scroll-menu-wrapper {
            position: relative;
        }
        
        .cat-btn {
            font-family: 'Bona Nova SC', serif;
            background: #fffaf4;
            border: 1px solid #e5ecd9;
            padding: 0.7rem 1.7rem;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            color: #3b5530;
            transition: all 0.2s ease;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
            white-space: nowrap;
        }
        .cat-btn.active {
            background: #3f6830;
            color: white;
            border-color: #3f6830;
            box-shadow: 0 4px 8px rgba(63,104,48,0.2);
        }
        .cat-btn:hover:not(.active) {
            background: #eef5e8;
            transform: translateY(-1px);
        }
        
        /* highlight animation for scroll menu on first load */
        @keyframes gentlePulse {
            0% { box-shadow: 0 0 0 0 rgba(63,104,48,0.4); border-color: #c7ddb5; }
            50% { box-shadow: 0 0 0 6px rgba(63,104,48,0.2); border-color: #8fb073; background: #fafff5; }
            100% { box-shadow: 0 0 0 0 rgba(63,104,48,0); border-color: #e5ecd9; }
        }
        .highlight-scroll {
            animation: gentlePulse 1.2s ease-out 2;
            border-radius: 60px;
        }
        
        /* small tooltip to indicate scroll */
        .scroll-tip {
            display: inline-block;
            background: #3f6830e0;
            backdrop-filter: blur(4px);
            color: white;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 40px;
            margin-right: 12px;
            white-space: nowrap;
            animation: fadeInOut 3s forwards;
            position: absolute;
            right: 20px;
            top: -30px;
            pointer-events: none;
            z-index: 5;
            font-weight: normal;
            font-family: monospace;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(8px); }
            15% { opacity: 1; transform: translateY(0px); }
            85% { opacity: 1; transform: translateY(0px); }
            100% { opacity: 0; transform: translateY(-8px); visibility: hidden; }
        }
        /* RTL adjust for tip */
        body.rtl .scroll-tip {
            right: auto;
            left: 20px;
        }
        
        .sections-area { margin-top: 1.8rem; min-height: 55vh; }
        .menu-section { display: none; animation: softFade 0.25s ease; }
        .menu-section.active-section { display: block; }
        @keyframes softFade { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
        .simple-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .menu-card { background: #ffffff; border-radius: 20px; padding: 1.2rem 1.4rem; border: 1px solid #ece8df; transition: 0.18s linear; }
        .menu-card:hover { border-color: #cfe0c2; background: #fffef9; }
        .item-name { font-size: 1.4rem; font-weight: 700; color: #345e25; }
        .item-desc { font-size: 1.6rem; color: #37352e; margin: 0.6rem 0 0.4rem; font-weight: bolder; line-height: 1.5; margin-bottom: -10px; }
        .price { font-size: 1.7rem; font-weight: 600; color: #578b3b; margin-top: 0.7rem; border-top: 1px solid #f0efea; padding-top: 0.6rem; }
        .section-title { font-size: 1.7rem; font-weight: 600; margin-bottom: 1.3rem; color: #417c2c; border-left: 4px solid #bdd3ac; padding-left: 0.8rem; transition: 0.1s; }
        .footer-note { text-align: center; margin-top: 3.5rem; font-size: 0.75rem; color: #acb89d; border-top: 1px solid #ece4d8; padding-top: 1.8rem; }
        
        .manual-refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #3f6830;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Bona Nova SC', serif;
            font-size: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 100;
            transition: all 0.2s;
        }
        .manual-refresh-btn:hover { background: #578b3b; transform: scale(1.05); }
        
        body.rtl { direction: rtl; text-align: right; }
        body.rtl .section-title { border-left: none; border-right: 4px solid #bdd3ac; padding-left: 0; padding-right: 0.8rem; }
        body.rtl .price { text-align: right; }
        body.rtl .lang-switch-wrapper { justify-content: flex-start; }
        
        /* responsive */
        @media (max-width: 680px) { 
            .header-content { padding: 0.8rem 0.8rem 0.5rem; }
            .cafe-container { padding: 0 1rem; }
            .cafe-name { font-size: 1.5rem; } 
            .cat-btn { padding: 0.5rem 1.2rem; font-size: 0.85rem; } 
            .logo-img { width: 78px; height: 78px; scale: 1.2; margin-top: 5px; }
            .manual-refresh-btn { padding: 6px 12px; font-size: 0.7rem; bottom: 10px; right: 10px; }
            .lang-toggle { padding: 0.4rem 1rem; font-size: 0.75rem; }
            .social-icon { width: 32px; height: 32px; font-size: 1rem; }
            .header-bg::before { filter: blur(6px); background-position: center 20%; }
            .scroll-tip { font-size: 0.65rem; padding: 3px 10px; top: -28px; }
        }
        @media (max-width: 480px) {
            .logo-img { width: 68px; height: 68px; }
            .cafe-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="header-bg">
    <div class="header-content">
        <div class="cafe-container">
            <div class="lang-switch-wrapper">
                <button id="langToggleBtn" class="lang-toggle">
                    <i class="fas fa-globe"></i> 
                    <span id="langToggleText">العربية / English</span>
                </button>
            </div>
            <div class="logo-block">
                <img src="https://topkapi2025.github.io/softroof/logo.png" alt="green bean cafe" class="logo-img" id="mainLogo">
                <div class="handmade-line"></div>
                <div class="cafe-name">Soft Roof Cafe</div>
                <div class="tagline">specialty drinks · cozy vibes</div>
            </div>
            <div class="social-links">
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="social-icon" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon"><i class="fas fa-map-marker-alt"></i></a>
                <a href="#" class="social-icon"><i class="fas fa-phone-alt"></i></a>
            </div>
        </div>
    </div>
</div>

<div class="cafe-container">
    <!-- Scroll menu wrapper with visual hints -->
    <div class="scroll-menu-wrapper" style="position: relative;">
        <div class="scroll-menu" id="scrollMenuContainer">
            <div class="menu-buttons" id="categoryButtons"></div>
        </div>
        <!-- edge fade hints (for desktop) -->
        <div class="scroll-hint-left" id="scrollHintLeft" style="opacity:0;"></div>
        <div class="scroll-hint-right" id="scrollHintRight" style="opacity:1;"></div>
        <!-- small floating tip that will show on first load -->
        <div id="scrollTip" class="scroll-tip" style="display: none;">👉 swipe / scroll 👈</div>
    </div>
    <div class="sections-area" id="sectionsArea"></div>
    <div class="footer-note"><span>from our small kitchen — served with care</span></div>
</div>

<button class="manual-refresh-btn" onclick="refreshMenuViaUser()">
    🔄 Refresh Menu
</button>

<script>
    // ------------------------- GLOBAL STATE -------------------------
    let currentMenuData = null;
    let currentLanguage = 'ar';
    let currentDataHash = null;
    let allSections = [];
    let categoryButtonsRef = [];
    let scrollHighlightShown = false;   // to show highlight animation only once
    
    // helpers
    function generateHash(data) { return JSON.stringify(data); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    
    function getCategoryDisplayName(category) {
        if (currentLanguage === 'en') return category.label || category.id;
        return category.title || category.label || category.id;
    }
    
    function applyRTLBasedOnLanguage() {
        if (currentLanguage === 'ar') {
            document.body.classList.add('rtl');
            document.documentElement.lang = 'ar';
            document.documentElement.dir = 'auto';
        } else {
            document.body.classList.remove('rtl');
            document.documentElement.lang = 'en';
            document.documentElement.dir = 'ltr';
        }
        // update edge hints direction awareness after language change (recalc scroll hints)
        setTimeout(updateScrollHintsVisibility, 50);
    }
    
    // Function to update scroll hint fades based on scroll position
    function updateScrollHintsVisibility() {
        const scrollDiv = document.getElementById('scrollMenuContainer');
        if (!scrollDiv) return;
        const leftHint = document.getElementById('scrollHintLeft');
        const rightHint = document.getElementById('scrollHintRight');
        if (!leftHint || !rightHint) return;
        const scrollLeft = scrollDiv.scrollLeft;
        const maxScroll = scrollDiv.scrollWidth - scrollDiv.clientWidth;
        // left fade visible if scrollLeft > 5px
        leftHint.style.opacity = scrollLeft > 8 ? '1' : '0';
        rightHint.style.opacity = (maxScroll - scrollLeft) > 8 ? '1' : '0';
    }
    
    // Build category buttons with scroll awareness + highlight
    function rebuildNavButtons() {
        const container = document.getElementById('categoryButtons');
        if (!container || !currentMenuData) return;
        container.innerHTML = '';
        const btns = [];
        
        currentMenuData.forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn' + (index === 0 ? ' active' : '');
            btn.textContent = getCategoryDisplayName(cat);
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                allSections.forEach(section => {
                    section.classList.toggle('active-section', section.dataset.sectionId === cat.id);
                });
                // optional: gently scroll button into view if needed
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
            container.appendChild(btn);
            btns.push(btn);
        });
        categoryButtonsRef = btns;
        if (allSections.length && !document.querySelector('.menu-section.active-section') && allSections[0]) {
            allSections[0].classList.add('active-section');
        }
        // Attach scroll listener for edge hints
        const scrollDiv = document.getElementById('scrollMenuContainer');
        if (scrollDiv) {
            scrollDiv.removeEventListener('scroll', updateScrollHintsVisibility);
            scrollDiv.addEventListener('scroll', updateScrollHintsVisibility);
            setTimeout(updateScrollHintsVisibility, 100);
        }
    }
    
    // Animate scroll menu to catch user attention (only once)
    function animateScrollMenuHighlight() {
        if (scrollHighlightShown) return;
        scrollHighlightShown = true;
        const scrollDiv = document.getElementById('scrollMenuContainer');
        if (!scrollDiv) return;
        // add highlight class to the container first button or wrapper
        const firstBtn = document.querySelector('.cat-btn');
        if (firstBtn) {
            firstBtn.classList.add('highlight-scroll');
            setTimeout(() => firstBtn.classList.remove('highlight-scroll'), 2600);
        }
        // show tooltip
        const tip = document.getElementById('scrollTip');
        if (tip) {
            tip.style.display = 'block';
            setTimeout(() => {
                if (tip) tip.style.display = 'none';
            }, 3200);
        }
        // also add small arrow pulse if possible
    }
    
    function refreshUILanguage() {
        if (!currentMenuData) return;
        if (categoryButtonsRef.length === currentMenuData.length) {
            currentMenuData.forEach((cat, idx) => {
                if (categoryButtonsRef[idx]) categoryButtonsRef[idx].textContent = getCategoryDisplayName(cat);
            });
        } else {
            rebuildNavButtons();
        }
        const sections = document.querySelectorAll('.menu-section');
        sections.forEach((section, idx) => {
            if (currentMenuData[idx]) {
                const titleEl = section.querySelector('.section-title');
                if (titleEl) titleEl.textContent = getCategoryDisplayName(currentMenuData[idx]);
            }
        });
        applyRTLBasedOnLanguage();
        const toggleSpan = document.getElementById('langToggleText');
        if (toggleSpan) toggleSpan.innerHTML = currentLanguage === 'ar' ? '🇸🇦 العربية / English' : 'English / العربية';
    }
    
    function createMenuSectionsFromData() {
        const sectionsArea = document.getElementById('sectionsArea');
        if (!sectionsArea) return;
        sectionsArea.innerHTML = '';
        allSections = [];
        currentMenuData.forEach((category) => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'menu-section';
            sectionDiv.dataset.sectionId = category.id;
            const titleEl = document.createElement('h3');
            titleEl.className = 'section-title';
            titleEl.textContent = getCategoryDisplayName(category);
            sectionDiv.appendChild(titleEl);
            const gridWrapper = document.createElement('div');
            gridWrapper.className = 'simple-grid';
            category.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `<div class="item-name">${escapeHtml(item.name)}</div><div class="item-desc">${escapeHtml(item.desc)}</div><div class="price">${escapeHtml(item.price)}</div>`;
                gridWrapper.appendChild(card);
            });
            sectionDiv.appendChild(gridWrapper);
            sectionsArea.appendChild(sectionDiv);
            allSections.push(sectionDiv);
        });
        if (allSections.length) allSections[0].classList.add('active-section');
        rebuildNavButtons();
        applyRTLBasedOnLanguage();
        // after fresh creation, trigger scroll highlight on first load once
        if (!scrollHighlightShown) setTimeout(() => animateScrollMenuHighlight(), 300);
        // Also ensure scroll hint updates after images/menu loaded
        setTimeout(updateScrollHintsVisibility, 200);
    }
    
    async function loadMenuFromJSON(showNotification = false) {
        try {
            const response = await fetch(`data.json?t=${Date.now()}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            const fullData = JSON.parse(text);
            const newCatalog = fullData.menuCatalog;
            const newHash = generateHash(newCatalog);
            if (currentDataHash !== newHash) {
                currentMenuData = newCatalog;
                currentDataHash = newHash;
                createMenuSectionsFromData();
                refreshUILanguage();
                if (showNotification) {
                    const btn = document.querySelector('.manual-refresh-btn');
                    if (btn) {
                        const origText = btn.textContent;
                        btn.textContent = '✓ Updated!';
                        btn.style.background = '#4caf50';
                        setTimeout(() => { btn.textContent = origText; btn.style.background = '#3f6830'; }, 1500);
                    }
                }
                // re-highlight scroll on data update if needed, but avoid duplicate repetitive tooltip
                if (!scrollHighlightShown) animateScrollMenuHighlight();
                return true;
            } else if (showNotification) {
                const btn = document.querySelector('.manual-refresh-btn');
                if (btn) {
                    const orig = btn.textContent;
                    btn.textContent = '✓ Already latest';
                    btn.style.background = '#7f8c6d';
                    setTimeout(() => { btn.textContent = orig; btn.style.background = '#3f6830'; }, 1000);
                }
            }
            return false;
        } catch (error) {
            console.error('Load error:', error);
            const area = document.getElementById('sectionsArea');
            if (area && !currentMenuData) area.innerHTML = '<div style="text-align:center;padding:2rem;">⚠️ Unable to load menu. Ensure data.json exists.</div>';
            return false;
        }
    }
    
    window.refreshMenuViaUser = async function() { await loadMenuFromJSON(true); };
    
    function toggleLanguage() {
        currentLanguage = currentLanguage === 'ar' ? 'en' : 'ar';
        localStorage.setItem('softroof_lang', currentLanguage);
        refreshUILanguage();
        const activeButton = document.querySelector('.cat-btn.active');
        if (activeButton && categoryButtonsRef.length) {
            const activeIndex = Array.from(document.querySelectorAll('.cat-btn')).indexOf(activeButton);
            if (activeIndex !== -1 && allSections[activeIndex]) {
                allSections.forEach(sec => sec.classList.remove('active-section'));
                allSections[activeIndex].classList.add('active-section');
            }
        } else if (allSections.length && !document.querySelector('.menu-section.active-section')) {
            allSections[0].classList.add('active-section');
        }
    }
    
    function initLanguagePreference() {
        const saved = localStorage.getItem('softroof_lang');
        currentLanguage = (saved === 'en') ? 'en' : 'ar';
        const toggleSpan = document.getElementById('langToggleText');
        if (toggleSpan) toggleSpan.innerHTML = currentLanguage === 'ar' ? '🇸🇦 العربية / English' : 'English / العربية';
    }
    
    function bindLanguageToggle() {
        const toggleBtn = document.getElementById('langToggleBtn');
        if (toggleBtn) toggleBtn.addEventListener('click', toggleLanguage);
    }
    
    function startPeriodicDataCheck() {
        setInterval(async () => {
            if (!currentMenuData) return;
            try {
                const response = await fetch(`data.json?t=${Date.now()}`);
                const text = await response.text();
                const freshData = JSON.parse(text);
                const newCatalog = freshData.menuCatalog;
                const newHash = generateHash(newCatalog);
                if (currentDataHash !== newHash) {
                    console.log("Auto data change, refreshing");
                    currentMenuData = newCatalog;
                    currentDataHash = newHash;
                    createMenuSectionsFromData();
                    refreshUILanguage();
                    if (!document.querySelector('.cat-btn.active') && categoryButtonsRef.length) {
                        categoryButtonsRef[0]?.classList.add('active');
                        if (allSections[0]) {
                            allSections.forEach(s => s.classList.remove('active-section'));
                            allSections[0].classList.add('active-section');
                        }
                    }
                }
            } catch (err) {}
        }, 8000);
    }
    
    // manual drag scroll helper
    function enableDragScroll() {
        const slider = document.getElementById('scrollMenuContainer');
        if (!slider) return;
        let isDown = false;
        let startX, scrollLeftStart;
        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.style.cursor = 'grabbing';
            startX = e.pageX - slider.offsetLeft;
            scrollLeftStart = slider.scrollLeft;
        });
        window.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = 'grab'; });
        window.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.2;
            slider.scrollLeft = scrollLeftStart - walk;
        });
        slider.style.cursor = 'grab';
    }
    
    document.getElementById('mainLogo').onerror = function() { this.style.backgroundColor = "#e0edcf"; };
    
    (async function init() {
        initLanguagePreference();
        bindLanguageToggle();
        await loadMenuFromJSON(false);
        if (currentMenuData) {
            refreshUILanguage();
            if (allSections.length && !document.querySelector('.menu-section.active-section')) allSections[0].classList.add('active-section');
            if (categoryButtonsRef.length && !document.querySelector('.cat-btn.active')) categoryButtonsRef[0]?.classList.add('active');
        }
        startPeriodicDataCheck();
        enableDragScroll();
        // additional resize and load listener to update scroll hints
        window.addEventListener('resize', () => setTimeout(updateScrollHintsVisibility, 100));
        setTimeout(() => { updateScrollHintsVisibility(); if (!scrollHighlightShown) animateScrollMenuHighlight(); }, 500);
    })();
</script>
