<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Soft Roof Cafe Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fefaf5; font-family: 'Bona Nova SC', serif; color: #2c2b26; line-height: 1.4; }
        .cafe-container { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }
        .handmade-line { width: 70px; height: 2px; background: #d0d9c6; margin: 0.75rem auto 0.5rem; border-radius: 2px; }
        .logo-block { text-align: center; margin: 1.2rem 0 1rem; }
        .logo-img {
    width: 206px;
    height: 126px;
    object-fit: cover;
    background: #e6efdf;
    border-radius: 20%;
    scale: 1.58;}
        .cafe-name { font-size: 1.9rem; font-weight: 700; margin-top: 1rem; color: #3f5c2f; }
        .tagline { font-size: 0.8rem; font-style: italic; color: #8b9a7b; margin-top: 0.25rem; }
        .social-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.6rem; margin: 1.1rem 0 0.5rem; }
        .social-icon { color: #4f6b3c; font-size: 1.3rem; background: #ffffffcc; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 40px; text-decoration: none; border: 1px solid #e2e9d9; transition: 0.2s ease; }
        .social-icon:hover { color: #2b6e2f; background: #f3f8ef; transform: translateY(-2px); }
        .scroll-menu { margin: 2rem 0 2rem; overflow-x: auto; white-space: nowrap; scrollbar-width: thin; padding-bottom: 0.5rem; }
        .menu-buttons { display: inline-flex; gap: 0.7rem; }
        .cat-btn { font-family: 'Bona Nova SC', serif; background: #fffaf4; border: 1px solid #e5ecd9; padding: 0.6rem 1.5rem; font-size: 1rem; border-radius: 40px; cursor: pointer; color: #3b5530; transition: all 0.2s; }
        .cat-btn.active { background: #3f6830; color: white; border-color: #3f6830; }
        .cat-btn:hover:not(.active) { background: #eef5e8; }
        .sections-area { margin-top: 1.8rem; min-height: 55vh; }
        .menu-section { display: none; animation: softFade 0.25s ease; }
        .menu-section.active-section { display: block; }
        @keyframes softFade { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
        .simple-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .menu-card { background: #ffffff; border-radius: 20px; padding: 1.2rem 1.4rem; border: 1px solid #ece8df; transition: 0.18s linear; }
        .menu-card:hover { border-color: #cfe0c2; background: #fffef9; }
        .item-name { font-size: 1.4rem; font-weight: 700; color: #345e25; }
        .item-desc {
    font-size: 1.6rem;
    color: #37352e;
    margin: 0.6rem 0 0.4rem;
    font-weight: bolder;
    line-height: 1.5;
    margin-bottom: -10px;
}
        .price { font-size: 1.7rem; font-weight: 600; color: #578b3b; margin-top: 0.7rem; border-top: 1px solid #f0efea; padding-top: 0.6rem; }
        .section-title { font-size: 1.7rem; font-weight: 600; margin-bottom: 1.3rem; color: #417c2c; border-left: 4px solid #bdd3ac; padding-left: 0.8rem; }
        .footer-note { text-align: center; margin-top: 3.5rem; font-size: 0.75rem; color: #acb89d; border-top: 1px solid #ece4d8; padding-top: 1.8rem; }
        
        /* Manual Refresh Button */
        .manual-refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #3f6830;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Bona Nova SC', serif;
            font-size: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 100;
            transition: all 0.2s;
        }
        .manual-refresh-btn:hover {
            background: #578b3b;
            transform: scale(1.05);
        }
        
        /* RTL Support for Arabic */
        body.rtl { direction: rtl; text-align: right; }
        body.rtl .section-title { border-left: none; border-right: 4px solid #bdd3ac; padding-left: 0; padding-right: 0.8rem; }
        body.rtl .price { text-align: right; }
        
        @media (max-width: 680px) { 
            .cafe-container { padding: 1rem; } 
            .cafe-name { font-size: 1.5rem; } 
            .cat-btn { padding: 0.4rem 1.2rem; font-size: 0.85rem; } 
            .logo-img { width: 78px; height: 78px; }
            .manual-refresh-btn { padding: 6px 12px; font-size: 0.7rem; bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>
<div class="cafe-container">
    <div class="logo-block">
        <img src="https://topkapi2025.github.io/softroof/logo.png" alt="green bean cafe" class="logo-img" id="mainLogo">
        <div class="cafe-name">Soft Roof</div>
        <div class="tagline">_____________</div>
        <div class="handmade-line"></div>
    </div>
    <div class="social-links">
        <a href="#" class="social-icon" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="#" class="social-icon" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-icon" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="#" class="social-icon" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="social-icon"><i class="fas fa-map-marker-alt"></i></a>
        <a href="#" class="social-icon"><i class="fas fa-phone-alt"></i></a>
    </div>
    <div class="scroll-menu"><div class="menu-buttons" id="categoryButtons"></div></div>
    <div class="sections-area" id="sectionsArea"></div>
    <div class="footer-note"><span>from our small kitchen — served with care</span></div>
</div>

<!-- Manual Refresh Button (visible to users) -->
<button class="manual-refresh-btn" onclick="loadMenuFromJSON()">
    🔄 Refresh Menu
</button>

<script>
    let currentMenuData = null, allSections = [];
    let currentDataHash = null; // Track if data has changed
    
    // Generate a simple hash of the data to detect changes
    function generateHash(data) {
        return JSON.stringify(data);
    }
    
    // Detect Arabic text and enable RTL
    function detectAndEnableRTL() {
        if (!currentMenuData) return;
        const arabicPattern = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/;
        let hasArabic = false;
        
        for (let cat of currentMenuData) {
            if (arabicPattern.test(cat.label) || arabicPattern.test(cat.title)) {
                hasArabic = true;
                break;
            }
            for (let item of cat.items) {
                if (arabicPattern.test(item.name) || arabicPattern.test(item.desc)) {
                    hasArabic = true;
                    break;
                }
            }
        }
        
        if (hasArabic) {
            document.body.classList.add('rtl');
            document.documentElement.lang = 'ar';
        } else {
            document.body.classList.remove('rtl');
            document.documentElement.lang = 'en';
        }
    }
    
    async function loadMenuFromJSON(showNotification = false) {
        try {
            const response = await fetch(`data.json?t=${Date.now()}`);
            const text = await response.text();
            const data = JSON.parse(text);
            const newHash = generateHash(data.menuCatalog);
            
            // Check if data has actually changed
            if (currentDataHash !== newHash) {
                currentMenuData = data.menuCatalog;
                currentDataHash = newHash;
                renderFullMenu();
                detectAndEnableRTL();
                
                // Optional: Show a subtle visual feedback
                if (showNotification) {
                    const btn = document.querySelector('.manual-refresh-btn');
                    const originalText = btn.textContent;
                    btn.textContent = '✓ Updated!';
                    btn.style.background = '#4caf50';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.style.background = '#3f6830';
                    }, 1500);
                }
            }
            return true;
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('sectionsArea').innerHTML = '<div style="text-align:center;padding:2rem;">⚠️ Unable to load menu. Please ensure data.json exists.</div>';
            return false;
        }
    }
    
    function renderFullMenu() { if (!currentMenuData) return; buildNavButtons(); createMenuSections(); }
    
    function buildNavButtons() {
        const container = document.getElementById('categoryButtons');
        container.innerHTML = '';
        currentMenuData.forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn' + (index === 0 ? ' active' : '');
            btn.textContent = cat.label;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                allSections.forEach(section => { section.classList.toggle('active-section', section.dataset.sectionId === cat.id); });
            });
            container.appendChild(btn);
        });
    }
    
    function createMenuSections() {
        const sectionsArea = document.getElementById('sectionsArea');
        sectionsArea.innerHTML = '';
        allSections = [];
        currentMenuData.forEach(category => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'menu-section';
            sectionDiv.dataset.sectionId = category.id;
            const titleEl = document.createElement('h3');
            titleEl.className = 'section-title';
            titleEl.textContent = category.title;
            sectionDiv.appendChild(titleEl);
            const gridWrapper = document.createElement('div');
            gridWrapper.className = 'simple-grid';
            category.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `<div class="item-name">${escapeHtml(item.name)}</div><div class="item-desc">${escapeHtml(item.desc)}</div><div class="price">${escapeHtml(item.price)}</div>`;
                gridWrapper.appendChild(card);
            });
            sectionDiv.appendChild(gridWrapper);
            sectionsArea.appendChild(sectionDiv);
            allSections.push(sectionDiv);
        });
        if (allSections.length) { allSections[0].classList.add('active-section'); }
    }
    
    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, function(m) { 
            if (m === '&') return '&amp;'; 
            if (m === '<') return '&lt;'; 
            if (m === '>') return '&gt;'; 
            return m; 
        }); 
    }
    
    document.getElementById('mainLogo').onerror = function() { this.style.backgroundColor = "#e0edcf"; };
    
    // Load once on page load
    loadMenuFromJSON();
    
    // Optional: Check for updates every 10 seconds but only refresh if data changed
    setInterval(async () => {
        try {
            const response = await fetch(`data.json?t=${Date.now()}`);
            const text = await response.text();
            const data = JSON.parse(text);
            const newHash = generateHash(data.menuCatalog);
            
            // Only refresh if data actually changed
            if (currentDataHash !== newHash) {
                console.log('Data changed! Refreshing menu...');
                currentMenuData = data.menuCatalog;
                currentDataHash = newHash;
                renderFullMenu();
                detectAndEnableRTL();
            }
        } catch (error) {
            console.error('Background check error:', error);
        }
    }, 5000); // Check every 5 seconds, but only update if changed
</script>
</body>
</html>
