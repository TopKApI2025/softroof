<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Green Bean Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Bona Nova SC', serif; background: #f0f7ea; padding: 2rem; }
        .admin-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h1 { color: #3f6830; margin-bottom: 0.5rem; }
        .subtitle { color: #7a8f6a; margin-bottom: 2rem; border-left: 3px solid #bdd3ac; padding-left: 1rem; }
        .github-setup { background: #e8f0e2; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #3f6830; }
        .github-setup input, .github-setup textarea { font-family: monospace; padding: 0.5rem; border: 1px solid #c2d6b2; border-radius: 6px; width: 100%; margin: 0.5rem 0; }
        .category-list { display: flex; flex-direction: column; gap: 2rem; }
        .category-card { background: #fefaf5; border-radius: 20px; padding: 1.5rem; border: 1px solid #e0e8d6; }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
        .category-title-input { font-size: 1.5rem; font-family: 'Bona Nova SC', serif; font-weight: 700; color: #345e25; border: 1px solid #d4e0c8; padding: 0.3rem 0.8rem; border-radius: 12px; background: white; width: 250px; }
        .category-id { font-size: 0.8rem; color: #8b9a7b; background: #eef3e8; padding: 0.2rem 0.6rem; border-radius: 20px; }
        .items-list { margin: 1rem 0; }
        .item-card { background: white; border-radius: 16px; padding: 1rem; margin-bottom: 0.8rem; border: 1px solid #e8efdf; display: grid; grid-template-columns: 2fr 3fr 1fr auto; gap: 0.8rem; align-items: center; }
        .item-card input, .item-card textarea { font-family: 'Bona Nova SC', serif; padding: 0.5rem; border: 1px solid #d4e0c8; border-radius: 8px; font-size: 0.9rem; }
        .item-card textarea { resize: vertical; }
        .btn-add-item { background: #578b3b; color: white; border: none; padding: 0.5rem 1rem; border-radius: 30px; cursor: pointer; font-family: 'Bona Nova SC', serif; margin-top: 0.5rem; }
        .btn-delete-item { background: #e0745a; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .btn-delete-category { background: #c97e5a; color: white; border: none; padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; }
        .action-buttons { margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn-primary { background: #3f6830; color: white; border: none; padding: 0.8rem 2rem; border-radius: 40px; cursor: pointer; font-family: 'Bona Nova SC', serif; font-size: 1rem; }
        .btn-secondary { background: #8b9a7b; color: white; border: none; padding: 0.8rem 2rem; border-radius: 40px; cursor: pointer; }
        .status { text-align: center; margin-top: 1rem; padding: 0.5rem; border-radius: 12px; }
        .status.success { background: #d4e8ca; color: #2d5a1e; }
        .status.error { background: #ffe0d6; color: #b53b1a; }
        .btn-add-category { margin: 1rem 0; background: #6c8f58; }
        @media (max-width: 768px) { .item-card { grid-template-columns: 1fr; } body { padding: 1rem; } }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>🌿 Menu Control Panel</h1>
    <div class="subtitle">Edit your menu - Changes save directly to GitHub</div>

    <div class="github-setup">
        <strong>⚙️ GitHub Setup (One Time):</strong><br>
        1. Get your token: <a href="https://github.com/settings/tokens" target="_blank">GitHub Settings → Tokens (classic)</a><br>
        2. Generate token with <strong>repo</strong> scope<br>
        3. Enter below (stored only in your browser):
        <input type="password" id="githubToken" placeholder="GitHub Personal Access Token">
        <input type="text" id="repoName" placeholder="Repository name (e.g., username/repo-name)">
        <button onclick="saveGitHubSettings()" class="btn-secondary">Save Settings</button>
        <div id="settingsStatus" style="font-size:0.8rem; margin-top:0.5rem;"></div>
    </div>

    <div id="categoriesContainer"></div>

    <button class="btn-primary btn-add-category" onclick="addNewCategory()">+ Add New Category</button>

    <div class="action-buttons">
        <button class="btn-primary" onclick="saveToGitHub()">💾 Save All Changes to GitHub</button>
        <button class="btn-secondary" onclick="loadFromGitHub()">🔄 Reload from GitHub</button>
    </div>
    <div id="statusMessage"></div>
</div>

<script>
    let menuData = [];
    let githubToken = localStorage.getItem('githubToken') || '';
    let repoName = localStorage.getItem('repoName') || '';
    let currentFileSha = null;

    function loadGitHubSettings() {
        if (githubToken) document.getElementById('githubToken').value = githubToken;
        if (repoName) document.getElementById('repoName').value = repoName;
    }

    function saveGitHubSettings() {
        githubToken = document.getElementById('githubToken').value;
        repoName = document.getElementById('repoName').value;
        localStorage.setItem('githubToken', githubToken);
        localStorage.setItem('repoName', repoName);
        document.getElementById('settingsStatus').innerHTML = '✓ Settings saved';
        setTimeout(() => { document.getElementById('settingsStatus').innerHTML = ''; }, 2000);
    }

    async function loadFromGitHub() {
        if (!githubToken || !repoName) { showStatus('❌ Please configure GitHub settings first', 'error'); return; }
        try {
            showStatus('Loading from GitHub...', 'success');
            const response = await fetch(`https://api.github.com/repos/${repoName}/contents/data.json`, {
                headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (!response.ok) throw new Error('File not found');
            const data = await response.json();
            currentFileSha = data.sha;
            const content = atob(data.content);
            const jsonData = JSON.parse(content);
            menuData = jsonData.menuCatalog;
            renderCategories();
            showStatus('✓ Loaded from GitHub successfully!', 'success');
        } catch (error) {
            showStatus('❌ Error: ' + error.message, 'error');
        }
    }

    async function saveToGitHub() {
        if (!githubToken || !repoName) { showStatus('❌ Please configure GitHub settings first', 'error'); return; }
        const dataToSave = { menuCatalog: menuData };
        const jsonString = JSON.stringify(dataToSave, null, 2);
        const contentBase64 = btoa(unescape(encodeURIComponent(jsonString)));
        try {
            showStatus('Saving to GitHub...', 'success');
            if (!currentFileSha) {
                const fileRes = await fetch(`https://api.github.com/repos/${repoName}/contents/data.json`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (fileRes.ok) { const fileData = await fileRes.json(); currentFileSha = fileData.sha; }
            }
            const response = await fetch(`https://api.github.com/repos/${repoName}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'Update menu from admin panel', content: contentBase64, sha: currentFileSha })
            });
            if (!response.ok) throw new Error('Save failed');
            const result = await response.json();
            currentFileSha = result.content.sha;
            showStatus('✓ Saved to GitHub! Menu will update on index.html within 1-2 minutes.', 'success');
        } catch (error) {
            showStatus('❌ Error saving: ' + error.message, 'error');
        }
    }

    function renderCategories() {
        const container = document.getElementById('categoriesContainer');
        if (!container) return;
        container.innerHTML = '';
        menuData.forEach((category, catIdx) => {
            const catDiv = document.createElement('div');
            catDiv.className = 'category-card';
            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerHTML = `<input type="text" class="category-title-input" value="${escapeHtml(category.title)}" onchange="updateCategoryTitle(${catIdx}, this.value)"><div class="category-id">ID: ${category.id}</div><button class="btn-delete-category" onclick="deleteCategory(${catIdx})">Delete Category</button>`;
            catDiv.appendChild(header);
            const itemsDiv = document.createElement('div');
            itemsDiv.className = 'items-list';
            category.items.forEach((item, itemIdx) => {
                const itemCard = document.createElement('div');
                itemCard.className = 'item-card';
                itemCard.innerHTML = `<input type="text" value="${escapeHtml(item.name)}" placeholder="Item name" onchange="updateItem(${catIdx}, ${itemIdx}, 'name', this.value)"><textarea rows="2" placeholder="Description" onchange="updateItem(${catIdx}, ${itemIdx}, 'desc', this.value)">${escapeHtml(item.desc)}</textarea><input type="text" value="${escapeHtml(item.price)}" placeholder="Price" onchange="updateItem(${catIdx}, ${itemIdx}, 'price', this.value)"><button class="btn-delete-item" onclick="deleteItem(${catIdx}, ${itemIdx})">Delete</button>`;
                itemsDiv.appendChild(itemCard);
            });
            catDiv.appendChild(itemsDiv);
            const addBtn = document.createElement('button');
            addBtn.className = 'btn-add-item';
            addBtn.textContent = '+ Add Item to ' + category.label;
            addBtn.onclick = () => addNewItem(catIdx);
            catDiv.appendChild(addBtn);
            container.appendChild(catDiv);
        });
    }

    function updateCategoryTitle(catIdx, newTitle) { menuData[catIdx].title = newTitle; }
    function updateItem(catIdx, itemIdx, field, value) { menuData[catIdx].items[itemIdx][field] = value; }
    function deleteItem(catIdx, itemIdx) { if (confirm('Delete this item?')) { menuData[catIdx].items.splice(itemIdx, 1); renderCategories(); } }
    function deleteCategory(catIdx) { if (confirm('Delete this entire category?')) { menuData.splice(catIdx, 1); renderCategories(); } }
    function addNewItem(catIdx) { menuData[catIdx].items.push({ name: "New Item", desc: "Description here", price: "$0.00" }); renderCategories(); }
    function addNewCategory() { menuData.push({ id: 'cat' + Date.now(), label: "New Category", title: "new section", items: [{ name: "Example item", desc: "Description", price: "$5.00" }] }); renderCategories(); showStatus('New category added. Click "Save to GitHub" to publish.', 'success'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    function showStatus(msg, type) { const statusDiv = document.getElementById('statusMessage'); statusDiv.className = `status ${type}`; statusDiv.textContent = msg; setTimeout(() => { statusDiv.className = ''; statusDiv.textContent = ''; }, 3000); }

    loadGitHubSettings();
    if (githubToken && repoName) { loadFromGitHub(); } else {
        fetch('data.json').then(res => res.json()).then(data => { menuData = data.menuCatalog; renderCategories(); }).catch(() => { showStatus('Please configure GitHub settings or ensure data.json exists', 'error'); });
    }
</script>
</body>
</html>
